<footer class="border-t border-gray-200 bg-gray-50">
  <div class="mx-auto max-w-7xl overflow-hidden px-4 py-12 sm:px-6 lg:px-8">
    <nav class="-mx-5 -my-2 flex flex-wrap justify-center" aria-label="Footer">
      <div class="px-5 py-2">
        <a href="{{ '/' | relative_url }}" class="text-base text-gray-500 hover:text-gray-900">Home</a>
      </div>
      <div class="px-5 py-2">
        <a href="{{ '/about/' | relative_url }}" class="text-base text-gray-500 hover:text-gray-900">About</a>
      </div>
      <div class="px-5 py-2">
        <a href="{{ '/contact/' | relative_url }}" class="text-base text-gray-500 hover:text-gray-900">Contact</a>
      </div>
    </nav>

    <p class="mt-8 text-center text-base text-gray-500">
      &copy; {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.
    </p>

    {% if site.dev %}
      <p class="mt-2 text-center text-sm font-semibold text-amber-600">Development configuration active</p>
    {% endif %}
  </div>
</footer>
