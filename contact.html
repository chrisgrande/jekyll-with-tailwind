---
layout: default
title: Contact
permalink: /contact/
---

<section class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-xl">
    <h1 class="text-3xl font-bold tracking-tight text-gray-900">Contact</h1>
    <p class="mt-2 text-gray-600">Add a form, email address, or other contact details here.</p>

    <form class="mt-8 space-y-6" action="#" method="post">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          autocomplete="name"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-xs focus:border-primary focus:ring-primary"
        />
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-xs focus:border-primary focus:ring-primary"
        />
      </div>
      <div>
        <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
        <textarea
          id="message"
          name="message"
          rows="4"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-xs focus:border-primary focus:ring-primary"
        ></textarea>
      </div>
      <button
        type="submit"
        class="rounded-md bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-primary-dark focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
      >
        Send message
      </button>
    </form>
  </div>
</section>
